name: collect-doughcon

# ⚠️ TEMPORARY: 5분 간격 cron. GitHub scheduler 가 신규 레포의 cron 을
# 인식하지 못하는 상태(2.5시간째 schedule 이벤트 0회)를 강제로 자극하기 위함.
# 인식이 확인되면 즉시 "7,37 * * * *" 으로 복원할 것. (무료 한도 2000분 초과 위험)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # CSV 자동 커밋용

concurrency:
  group: collect-doughcon
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 회당 실행 시간 단축 핵심 (기획서 §3.2)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install deps (collector only)
        # collector 는 requests 만 있으면 충분. merger 의존성(yfinance, pandas)은 설치 생략.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "requests>=2.31,<3"

      - name: Run collector
        run: python collector.py

      - name: Commit if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/doughcon_raw.csv
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "chore(data): collect doughcon @ ${ts}"
          # 다른 워크플로우가 동시에 커밋하는 경우를 위한 가벼운 재시도 (rebase)
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && break
            sleep 2
          done
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
